version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: career_platform
      POSTGRES_USER: ${DB_USER:-career_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strong_password_here}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  postgres_data:
